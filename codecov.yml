codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        base: auto
        branches:
          - master
          - main
        if_ci_failed: error
        only_pulls: false
        flags:
          - unit
          - integration
        paths:
          - "src"
    patch:
      default:
        target: 80%
        threshold: 5%
        base: auto
        branches:
          - master
          - main
        if_ci_failed: error
        only_pulls: true
        paths:
          - "src"

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

github_checks:
  annotations: true
